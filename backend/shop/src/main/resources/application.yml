server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aesop_shop
    username: postgres
    password: 1004
    hikari:
      connection-init-sql: SET client_encoding TO 'UTF8'

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
    defer-datasource-initialization: true
  security:
    user:
      name: admin
      password: 1234
  sql:
    init:
      mode: always
      encoding: UTF-8

# Toss Payments settings
toss:
  secret-key: ${TOSS_SECRET_KEY:}
  # Set TOSS_SECRET_KEY in your local environment. Do not commit the secret key.
