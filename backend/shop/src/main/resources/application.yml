server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aesop_shop
    username: postgres
    password: 1004

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
      show-sql: true
    defer-datasource-initialization: true
  security:
    user:
      name: admin
      password: 1234
  sql:
    init:
      mode: always

# 토스페이먼츠 설정 (테스트 키)
toss:
  secret-key: ${TOSS_SECRET_KEY:}
  # Set TOSS_SECRET_KEY in your local environment. Do not commit the secret key.
